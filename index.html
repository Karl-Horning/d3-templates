<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>D3 Templates</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            body {
                font-family: system-ui, sans-serif;
                max-width: 960px;
                margin: 0 auto;
                padding: 2rem 1rem;
                color: #222;
            }

            header {
                margin-bottom: 2rem;
            }

            h1 {
                font-size: 1.5rem;
                margin: 0 0 0.5rem;
            }

            header p {
                margin: 0;
                color: #555;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 1.5rem;
            }

            .card {
                border: 1px solid #ddd;
                border-radius: 4px;
                overflow: hidden;
                text-decoration: none;
                color: inherit;
                display: block;
                transition: border-color 0.15s;
            }

            .card:hover {
                border-color: steelblue;
            }

            .card img {
                width: 100%;
                height: 180px;
                object-fit: cover;
                display: block;
                background: #f5f5f5;
            }

            .card-label {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>D3 Templates</h1>
            <p>
                Plain JavaScript chart examples adapted from Observable. Select
                a template to view the output.
            </p>
        </header>
        <main>
            <div class="grid">
                <a class="card" href="templates/area-chart/area-chart.html">
                    <img
                        src="imgs/area-chart-preview.png"
                        alt="Area chart showing Apple stock closing prices over time"
                    />
                    <div class="card-label">Area chart</div>
                </a>
                <a class="card" href="templates/bar-chart/bar-chart.html">
                    <img
                        src="imgs/bar-chart-preview.png"
                        alt="Bar chart showing English letter frequency"
                    />
                    <div class="card-label">Bar chart</div>
                </a>
                <a class="card" href="templates/donut-chart/donut-chart.html">
                    <img
                        src="imgs/donut-chart-preview.png"
                        alt="Donut chart showing proportional data with coloured segments"
                    />
                    <div class="card-label">Donut chart</div>
                </a>
                <a class="card" href="templates/histogram/histogram.html">
                    <img
                        src="imgs/histogram-preview.png"
                        alt="Histogram showing the distribution of US unemployment rates"
                    />
                    <div class="card-label">Histogram</div>
                </a>
                <a
                    class="card"
                    href="templates/horizontal-bar-chart/horizontal-bar-chart.html"
                >
                    <img
                        src="imgs/horizontal-bar-chart-preview.png"
                        alt="Horizontal bar chart showing English letter frequency"
                    />
                    <div class="card-label">Horizontal bar chart</div>
                </a>
                <a class="card" href="templates/line-chart/line-chart.html">
                    <img
                        src="imgs/line-chart-preview.png"
                        alt="Line chart showing Apple stock closing prices over time"
                    />
                    <div class="card-label">Line chart</div>
                </a>
            </div>
        </main>
    </body>
</html>
